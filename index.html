<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Growth SaaS App</title>
    <link rel="stylesheet" href="./css/main.css" />
    <!-- Font Awesome link -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="shortcut icon" href="./images/favicon.ico" type="image/x-icon" />
  </head>
  <body>
    <header>
      <nav class="navbar">
        <div class="container">
          <div class="logo">
            <a href="./index.html"
              ><img src="./images/logo.png" alt="logo"
            /></a>
          </div>
          <!-- menu -->
          <div class="menu">
            <ul>
              <li><a href="./index.html">Home</a></li>
              <li><a href="#">About Us</a></li>
              <li><a href="#">Blog</a></li>
              <li>
                <a href="#" class="btn btn-dark"
                  ><i class="fa-solid fa-user"></i>Log In</a
                >
              </li>
            </ul>
          </div>
        </div>
      </nav>
    </header>

    <!-- main -->
    <main>
      <!-- Hero section-->
      <section class="hero">
        <div class="container">
          <div class="hero-text">
            <h1 class="hero-heading text-xxl">
              A powerful solution to grow your startup. Fast!
            </h1>
            <p class="hero-paragraph">
              Organise, collaborate, and track progress seamlessly with our
              one-stop-shop startup growth tool.
            </p>

            <div class="hero-btns">
              <a href="#" class="btn btn-primary">Get Started</a>
              <a href="#" class="btn"
                ><i class="fa-solid fa-laptop"></i> Book a Demo</a
              >
            </div>
          </div>
        </div>
      </section>

      <!-- Video Section -->
      <section class="video">
        <div class="container">
          <div class="video-content">
            <div class="top-content">
              <p class="video-paragraph">
                See how it works and get started in less than 2 minutes.
              </p>

              <img src="./images/video-preview.png" alt="learn how it works" />

              <a href="#" class="btn btn-primary">Get Started</a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <script src="./js/main.js"></script>
  </body>
</html>
